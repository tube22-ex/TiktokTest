<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TikTok Duration Checker Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; }
        input { width: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; background: #fe2c55; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 1.5rem; color: #fe2c55; }
    </style>
</head>
<body>

    <div class="card">
        <h2>TikTok再生時間 瞬時取得</h2>
        <input type="text" id="urlInput" placeholder="TikTokのURLをペースト">
        <button onclick="checkDuration()">取得実行</button>
        <div id="result">結果がここに表示されます</div>
    </div>

    <script>
        async function checkDuration() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('result');
            if (!url) return alert("URLを入力してください");

            resDiv.innerText = "解析中...";

            try {
                // VercelのAPIを叩く
                const response = await fetch(`/api/get-duration?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.duration) {
                    resDiv.innerText = `再生時間: ${data.duration} 秒`;
                } else {
                    resDiv.innerText = "取得失敗 (動画が見つかりません)";
                }
            } catch (err) {
                resDiv.innerText = "エラー: サーバーに接続できませんでした";
            }
        }
    </script>
</body>
</html>
